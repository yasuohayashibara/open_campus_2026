<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <title>RL LAB R01 固定実機コース</title>
  <desc>A3横100%印刷用。コース、開始位置、円形障害物3個、ゴールのみを示す。</desc>
  <style>
    text{font-family:"Noto Sans JP","Yu Gothic",sans-serif;font-weight:800;text-anchor:middle}
    .obstacle{fill:#ff8b4840;stroke:#e56529;stroke-width:1}
  </style>
  <rect width="420" height="297" fill="white"/>
  <rect x="20" y="20" width="380" height="257" rx="1" fill="#f7fbfd" stroke="#17394c" stroke-width="1.2"/>

  <g aria-label="障害物1">
    <circle cx="134" cy="81.78" r="14.2" class="obstacle"/>
    <circle cx="134" cy="81.78" r="1" fill="#67351f"/>
    <text x="134" y="83.3" font-size="4.5" fill="#67351f">O1</text>
  </g>
  <g aria-label="障害物2">
    <circle cx="212.11" cy="193" r="16.5" class="obstacle"/>
    <circle cx="212.11" cy="193" r="1" fill="#67351f"/>
    <text x="212.11" y="194.5" font-size="4.5" fill="#67351f">O2</text>
  </g>
  <g aria-label="障害物3">
    <circle cx="294.44" cy="104.04" r="15.6" class="obstacle"/>
    <circle cx="294.44" cy="104.04" r="1" fill="#67351f"/>
    <text x="294.44" y="105.6" font-size="4.5" fill="#67351f">O3</text>
  </g>

  <g aria-label="ゴール">
    <circle cx="368.33" cy="64.48" r="20.6" fill="#8465ff30" stroke="#6646df" stroke-width="1.2"/>
    <circle cx="368.33" cy="64.48" r="1.5" fill="#6646df"/>
    <text x="368.33" y="66.2" font-size="4.8" fill="#39249d">GOAL</text>
  </g>

  <g transform="translate(74.89 200.84) rotate(-21.8)" aria-label="開始位置">
    <rect x="-16" y="-16" width="32" height="32" rx="3" fill="#18d9dc25" stroke="#00aeb3" stroke-width="1" stroke-dasharray="2 1"/>
    <path d="M-9 0H11M6 -5l5 5-5 5" fill="none" stroke="#007d83" stroke-width="1.5"/>
  </g>
  <text x="74.89" y="223.5" font-size="4.5" fill="#007d83">START</text>
</svg>
